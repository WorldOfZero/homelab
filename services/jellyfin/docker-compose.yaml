x-logging-config:
  &logging-config
  driver: "json-file"
  options:
    max-size: "1m"
    max-file: "1"
    tag: "{{.Name}}"
    
configs:
  ts-serve:
    content: |
      {"TCP":{"443":{"HTTPS":true}},
      "Web":{"$${TS_CERT_DOMAIN}:443":
          {"Handlers":{"/":
          {"Proxy":"http://127.0.0.1:8096"}}}},
      "AllowFunnel":{"$${TS_CERT_DOMAIN}:443":false}}

services:
  tailscale:
    image: tailscale/tailscale:latest # Image to be used
    container_name: tailscale-jellyfin # Name for local container management
    hostname: jellyfin
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/serve.json # Tailscale Serve configuration to expose the web interface on your local Tailnet - remove this line if not required
      - TS_USERSPACE=false
      - TS_ENABLE_HEALTH_CHECK=true              # Enable healthcheck endpoint: "/healthz"
      - TS_LOCAL_ADDR_PORT=127.0.0.1:41236       # The <addr>:<port> for the healthz endpoint
      #- TS_ACCEPT_DNS=true # Uncomment when using MagicDNS
      - TS_AUTH_ONCE=true
    configs:
      - source: ts-serve
        target: /config/serve.json
    volumes:
      - '/mnt/Vault/Configuration/tailscale/state-jellyfin:/var/lib/tailscale'
    devices:
      - /dev/net/tun:/dev/net/tun # Network configuration for Tailscale to work
    cap_add:
      - net_admin # Tailscale requirement
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:41236/healthz"] # Check Tailscale has a Tailnet IP and is operational
      interval: 1m # How often to perform the check
      timeout: 10s # Time to wait for the check to succeed
      retries: 3 # Number of retries before marking as unhealthy
      start_period: 10s # Time to wait before starting health checks
    logging: *logging-config

  application:
    image: jellyfin/jellyfin
    network_mode: service:tailscale
    container_name: app-jellyfin
    user: 1000:1000
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
    volumes:
      - '/mnt/Vault/Configuration/jellyfin/config:/config'
      - '/mnt/Vault/Configuration/jellyfin/cache:/cache'
      - type: bind
        source: /mnt/Vault/Media
        target: /media
        read_only: true
      # Fonts for subtitles
      - type: bind
        source: /mnt/Vault/Media/Fonts
        target: /usr/local/share/fonts/custom
        read_only: true
    depends_on:
      tailscale:
        condition: service_healthy
    restart: 'unless-stopped'
    # TODO: setup published server address
    #environment:
    #  - JELLYFIN_PublishedServerUrl=http://jellyfin.home.worldofzero.com
    logging: *logging-config